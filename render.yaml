services:
  - type: web
    name: pricepilot
    runtime: python
    plan: free
    buildCommand: "echo no build needed"
    startCommand: "python server/app.py"
    healthCheckPath: /
    envVars:
      # Paste these values in the Render dashboard (Environment tab).
      - key: SEARCH_API_KEY        # SerpAPI key (Google Shopping, all categories)
        sync: false
      - key: PAYPAL_CLIENT_ID      # PayPal REST client id
        sync: false
      - key: PAYPAL_SECRET         # PayPal REST secret
        sync: false
      - key: PAYPAL_ENV            # "sandbox" or "live"
        sync: false
      - key: EBAY_CLIENT_ID        # eBay App ID
        sync: false
      - key: EBAY_CLIENT_SECRET    # eBay Cert ID
        sync: false
      - key: EBAY_RUNAME           # eBay RuName (set after you have the Render URL)
        sync: false
      - key: EBAY_ENV              # "sandbox" or "production"
        sync: false
      - key: STRIPE_SECRET_KEY     # optional
        sync: false
